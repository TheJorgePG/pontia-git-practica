name: Primer Workflow

on:
  workflow_dispatch:
    inputs:
      mensaje:
        description: 'Escribe un mensaje'
        required: true
        default: 'Mensaje por defecto'

jobs:
  imprimir-mensaje:
    runs-on: ubuntu-latest
    steps:
      - name: Primer workflow
        run: |
          echo "El mensaje es: ${{ github.event.inputs.mensaje }}"